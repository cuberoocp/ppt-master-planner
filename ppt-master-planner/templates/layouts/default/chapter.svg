<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- LAYOUT:chapter PAGE_KEY:chapter -->
  <rect width="1920" height="1080" fill="#1a1a2e"/>
  <rect x="120" y="120" width="1680" height="240" rx="8" fill="#16213e"/>
  <text x="200" y="230" font-family="Microsoft YaHei, sans-serif" font-size="24" fill="#e94560">{CHAPTER_NUMBER}</text>
  <text x="200" y="290" font-family="Microsoft YaHei, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">{CHAPTER_TITLE}</text>
  <text x="200" y="400" font-family="Microsoft YaHei, sans-serif" font-size="28" fill="#a0a0b0">{CHAPTER_SUBTITLE}</text>
  <line x1="200" y1="440" x2="800" y2="440" stroke="#e94560" stroke-width="2"/>
  <rect x="120" y="520" width="1680" height="440" rx="8" fill="none" stroke="#2a2a4e" stroke-width="2"/>
  <text x="200" y="580" font-family="Microsoft YaHei, sans-serif" font-size="28" fill="#c0c0d0">{CONTENT_SECTION}</text>
  <text x="1700" y="980" font-family="Arial, sans-serif" font-size="14" fill="#404060">{SLIDE_NUMBER}</text>
</svg>
