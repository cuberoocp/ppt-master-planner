<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- LAYOUT:cover PAGE_KEY:cover -->
  <rect width="1920" height="1080" fill="#1a1a2e"/>
  <rect x="80" y="80" width="1760" height="920" rx="12" fill="none" stroke="#e94560" stroke-width="3"/>
  <line x1="80" y1="300" x2="800" y2="300" stroke="#e94560" stroke-width="4"/>
  <text x="160" y="240" font-family="Microsoft YaHei, sans-serif" font-size="64" font-weight="bold" fill="#ffffff">{MAIN_TITLE}</text>
  <text x="160" y="360" font-family="Microsoft YaHei, sans-serif" font-size="32" fill="#a0a0b0">{SUBTITLE}</text>
  <text x="160" y="880" font-family="Arial, sans-serif" font-size="20" fill="#606080">{PRESENTER}</text>
  <text x="160" y="920" font-family="Arial, sans-serif" font-size="16" fill="#404060">{DATE}</text>
  <rect x="1500" y="800" width="340" height="120" rx="8" fill="#e94560" opacity="0.3"/>
  <text x="1670" y="870" font-family="Microsoft YaHei, sans-serif" font-size="18" fill="#e94560" text-anchor="middle">{EVENT}</text>
</svg>
