<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- LAYOUT:content PAGE_KEY:content -->
  <rect width="1920" height="1080" fill="#ffffff"/>
  <rect x="0" y="0" width="1920" height="80" fill="#1a1a2e"/>
  <text x="60" y="48" font-family="Microsoft YaHei, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">{SLIDE_TITLE}</text>
  <line x1="60" y1="80" x2="400" y2="80" stroke="#e94560" stroke-width="3"/>
  <rect x="80" y="120" width="880" height="860" rx="6" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="120" y="180" font-family="Microsoft YaHei, sans-serif" font-size="24" fill="#333333">{CONTENT_LEFT}</text>
  <rect x="1000" y="120" width="840" height="860" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1040" y="180" font-family="Microsoft YaHei, sans-serif" font-size="24" fill="#333333">{CONTENT_RIGHT}</text>
  <text x="1860" y="1040" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0" text-anchor="end">{SLIDE_NUMBER}</text>
</svg>
